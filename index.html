                    <div class="relative overflow-hidden rounded-xl mb-4 h-48 bg-gray-50">
                        <img src="${item.img}" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800&auto=format&fit=crop';" class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute bottom-2 left-2 bg-black/60 text-white text-xs font-bold px-2 py-1 rounded-lg backdrop-blur-sm leading-tight">
                            <div class="text-white/70 font-normal text-[10px]">Konečná cena pro kupujícího</div>
                            ${getPriceInfo(item.price).total.toLocaleString('cs-CZ')} Kč
                        </div>
                        <button onclick="toggleFavorite(event, '${item.id}', '${item.type}')" data-id="${item.id}" class="fav-btn absolute top-2 right-2 w-8 h-8 rounded-full bg-black/40 backdrop-blur-sm flex items-center justify-center hover:bg-black/60 transition-colors ${isFavorite(item.id) ? 'text-red-500' : 'text-white'}" aria-label="Přidat do oblíbených">
                            <svg class="w-4 h-4" fill="${isFavorite(item.id) ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                    </div>
                    <div class="text-xs font-bold text-${accentColor}-500 mb-1 uppercase">${isAukce ? 'Aukce' : 'Pevná cena'} · ${item.category}</div>
                    <h3 class="text-base font-bold text-gray-800 line-clamp-2 leading-tight flex-grow">${item.title}</h3>
                    <div class="mt-3 pt-3 border-t border-gray-50">
                        <div class="text-2xl font-black text-${accentColor}-500" id="list-price-${item.id}">${item.price.toLocaleString('cs-CZ')} Kč</div>
                    </div>
                </div>`;
            };

            return `
            <div class="w-full bg-white/90 backdrop-blur-xl p-6 md:p-10 rounded-[2rem] shadow-xl fade-in min-h-[500px] border border-white/50">
                <button onclick="history.back()" class="mb-6 text-sky-500 font-bold hover:text-sky-600 transition-colors flex items-center gap-2 text-lg">← Zpět</button>
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-sky-400 to-sky-200 flex items-center justify-center text-white font-bold text-2xl shrink-0 overflow-hidden">
                        ${sellerAvatar ? '<img src="' + sellerAvatar + '" class="w-full h-full object-cover">' : sellerInitial}
                    </div>
                    <div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-pastel-text">${sellerName}</h2>
                        <p class="text-gray-400 text-sm">${total} aktivní${total === 1 ? '' : total >= 2 && total <= 4 ? '' : 'ch'} inzerát${total === 1 ? '' : total >= 2 && total <= 4 ? 'y' : 'ů'}</p>
                    </div>
                </div>
                ${!window.dataLoaded ? '<p class="text-gray-500 py-10 text-center font-bold animate-pulse">⏳ Načítám položky ze serveru...</p>' : (total === 0 ? '<p class="text-gray-500 py-10 text-center">Tento prodejce nemá žádné aktivní inzeráty.</p>' : '')}
                ${sellerAukce.length > 0 ? `
                    <h3 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <span class="inline-block bg-sky-100 text-sky-700 text-xs px-3 py-1 rounded-full font-bold uppercase">Aukce (${sellerAukce.length})</span>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">${sellerAukce.map(renderCard).join('')}</div>
                ` : ''}
                ${sellerPevna.length > 0 ? `
                    <h3 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <span class="inline-block bg-pink-100 text-pink-700 text-xs px-3 py-1 rounded-full font-bold uppercase">Pevná cena (${sellerPevna.length})</span>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">${sellerPevna.map(renderCard).join('')}</div>
                ` : ''}
            </div>`;
        };

        // --- ASYNC LOADER PRO ZÁLOŽKU TRANSAKCÍ ---
        window.loadTransakceTab = async function() {
            if (!supabaseClient || !window.currentUser) return;
            const container = document.getElementById('transakce-content');
            if (!container) return;

            const { data: dbTx, error } = await supabaseClient
                .from('transactions')
                .select('*')
                .or(`buyer_id.eq.${window.currentUser.id},seller_id.eq.${window.currentUser.id}`)
                .order('created_at', { ascending: false });

            if (error) {
                if (container) container.innerHTML = `<p class="text-red-500 text-center py-8">Chyba načítání transakcí: ${error.message}</p>`;
                return;
            }

            window._txData = dbTx || [];

            const html = renderProfileTabContent('_transakce_render');
            if (container) {
                container.innerHTML = html || '<p class="text-gray-500 text-center py-8 fade-in">Zatím jste neuskutečnili žádné nákupy ani prodeje.</p>';
            }
        };

        // --- NAVIGACE A ROUTING (SPA) ---
        function navigate(path, param = null) {
            let viewName = path;
            let idOrCategory = param;

            if (path.includes('/')) {
                const parts = path.split('/');
                viewName = parts[0];
                idOrCategory = parts[1];
            }

            const app = document.getElementById('app');
            if (!views[viewName]) viewName = 'home';
            
            let htmlToRender = views[viewName](idOrCategory);
            app.innerHTML = htmlToRender;

            const fullUrl = idOrCategory && !vsechnyKategorie.includes(idOrCategory) ? `${viewName}/${idOrCategory}` : viewName;
            if (fullUrl !== 'home') {
                history.pushState({ view: fullUrl, param: idOrCategory }, '', '#' + fullUrl);
            } else {
                history.pushState({ view: 'home' }, '', window.location.pathname);
            }
        }

        window.toggleBidMenu = function(id) {
            document.getElementById('bid-menu-' + id).classList.toggle('hidden');
        };

        // --- TOAST NOTIFIKACE (PUSH) ---
        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bg = 'bg-gray-800 text-white';
            let icon = `<svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            
            if (type === 'success') {
                bg = 'bg-white border-l-4 border-green-500 text-gray-800 shadow-xl';
                icon = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else if (type === 'warning') {
                bg = 'bg-white border-l-4 border-yellow-500 text-gray-800 shadow-xl';
                icon = `<svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 px-4 py-4 rounded-xl shadow-lg transform transition-all duration-300 translate-x-full ${bg} pointer-events-auto`;
            toast.innerHTML = `${icon} <span class="font-bold text-sm">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        };

        // --- ZPRACOVÁNÍ REALTIME DAT ---
        window.handleRealtimeAuctionUpdate = function(newAuctionData) {
            const id = newAuctionData.id || newAuctionData.auction_id;
            const index = dataAukce.findIndex(a => a.id === id);
            if (index === -1) return;

            const auction = dataAukce[index];
            const oldPrice = auction.price;
            const newPrice = newAuctionData.current_price || newAuctionData.amount || newAuctionData.starting_price;
            const newBidder = newAuctionData.last_bidder_id || newAuctionData.bidder_id;

            if (newPrice > oldPrice) {
                auction.price = newPrice;
                auction.last_bidder_id = newBidder;

                if (window.currentUser && newBidder !== window.currentUser.id) {
                    if (auction.seller_id === window.currentUser.id) {
                        showToast(`Nový příhoz ${newPrice.toLocaleString('cs-CZ')} Kč na vaši aukci "${auction.title}"!`, 'success');
                    } else if (JSON.parse(localStorage.getItem('ft_local_bids') || '{}')[id]) {
                        showToast(`Byli jste překonáni v aukci "${auction.title}"! Nová cena: ${newPrice.toLocaleString('cs-CZ')} Kč.`, 'warning');
                    }
                }

                const priceEl = document.getElementById('price-' + id);
                const totalEl = document.getElementById('total-' + id);
                const listPriceEl = document.getElementById('list-price-' + id);
                
                if (priceEl) {
                    priceEl.setAttribute('data-price', newPrice);
                    priceEl.innerText = newPrice.toLocaleString('cs-CZ') + ' Kč';
                    priceEl.classList.add('text-green-500', 'scale-105', 'transition-transform');
                    setTimeout(() => priceEl.classList.remove('text-green-500', 'scale-105'), 500);
                }
                if (totalEl) totalEl.innerText = getPriceInfo(newPrice).total.toLocaleString('cs-CZ') + ' Kč';
                
                if (listPriceEl) {
                    listPriceEl.innerText = newPrice.toLocaleString('cs-CZ') + ' Kč';
                    listPriceEl.classList.add('text-green-500', 'scale-105', 'transition-transform');
                    setTimeout(() => listPriceEl.classList.remove('text-green-500', 'scale-105'), 500);
                }

                if (window.location.hash.includes('profil')) {
                    loadProfileData('inzeraty');
                } else if (window.location.hash.includes('aukce-detail/' + id)) {
                    setTimeout(() => navigate('aukce-detail', id), 2000);
                }
            }
        };

        // --- BROWSER PUSH NOTIFIKACE ---
        window.requestPushPermission = async function() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }
        };

        window.sendBrowserNotification = function(title, body, icon = null) {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            new Notification(title, {
                body: body,
                icon: icon || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=64&auto=format&fit=crop',
                badge: icon || undefined,
                tag: 'fairtrade-' + Date.now()
            });
        };

        // --- REALTIME HANDLER PRO TRANSAKCE ---
        window.handleRealtimeTransactionUpdate = function(tx, eventType) {
            if (!window.currentUser) return;

            const isBuyer  = tx.buyer_id  === window.currentUser.id;
            const isSeller = tx.seller_id === window.currentUser.id;
            if (!isBuyer && !isSeller) return;

            let localTx = JSON.parse(localStorage.getItem('ft_local_transactions') || '[]');
            const idx = localTx.findIndex(t => t.id === tx.id);
            if (idx >= 0) {
                localTx[idx] = { ...localTx[idx], ...tx };
            } else {
                localTx.push(tx);
            }
            localStorage.setItem('ft_local_transactions', JSON.stringify(localTx));

            const statusLabels = {
                created:   isSeller ? `📦 Nová objednávka: "${tx.item_title}"` : `✅ Objednávka vytvořena: "${tx.item_title}"`,
                paid:      isSeller ? `💰 Platba přijata za "${tx.item_title}"` : `✅ Platba potvrzena pro "${tx.item_title}"`,
                returned:  `↩️ Vrácení zboží: "${tx.item_title}"`,
                completed: isSeller ? `🎉 Prodej dokončen: "${tx.item_title}"` : `🎉 Nákup dokončen: "${tx.item_title}"`
            };

            const toastType = tx.status === 'returned' ? 'warning' : 'success';
            const msg = statusLabels[tx.status] || `Transakce aktualizována: "${tx.item_title}"`;

            showToast(msg, toastType);
            sendBrowserNotification('FairTrade', msg, tx.item_image || null);

            const txContainer = document.getElementById('transakce-content');
            if (txContainer) {
                if (window._txData) {
                    const idx = window._txData.findIndex(t => t.id === tx.id);
                    if (idx >= 0) window._txData[idx] = { ...window._txData[idx], ...tx };
                    else window._txData.unshift(tx);
                    const html = renderProfileTabContent('_transakce_render');
                    txContainer.innerHTML = html || '<p class="text-gray-500 text-center py-8 fade-in">Zatím jste neuskutečnili žádné nákupy ani prodeje.</p>';
                } else {
                    loadTransakceTab();
                }
            }
        };

        // --- ZAPNUTÍ WEBSOCKET CHANNELŮ ---
        window.setupRealtime = function() {
            if (!supabaseClient) return;

            requestPushPermission();

            supabaseClient.channel('realtime_aukce')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'aukce' }, (payload) => {
                    handleRealtimeAuctionUpdate(payload.new);
                }).subscribe();

            supabaseClient.channel('realtime_bids')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bids' }, (payload) => {
                    handleRealtimeAuctionUpdate({
                        id: payload.new.auction_id,
                        current_price: payload.new.amount,
                        last_bidder_id: payload.new.bidder_id
                    });
                }).subscribe();

            supabaseClient.channel('realtime_pevna_cena')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pevna_cena' }, (payload) => {
                    const updated = payload.new;
                    if (updated.status === 'prodáno' || updated.status === 'archivováno' || updated.status === 'zruseno') {
                        dataPevnaCena = dataPevnaCena.filter(i => i.id !== updated.id);
                        if (window.location.hash.includes('pevna-cena') && !window.location.hash.includes('detail')) {
                            navigate('pevna-cena');
                        }
                        if (window.location.hash.includes('pevna-cena-detail/' + updated.id)) {
                            showToast("Tato položka byla právě zakoupena jiným uživatelem.", "warning");
                            setTimeout(() => navigate('pevna-cena'), 2000);
                        }
                    }
                }).subscribe();

            supabaseClient.channel('realtime_transactions')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, (payload) => {
                    handleRealtimeTransactionUpdate(payload.new, 'INSERT');
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'transactions' }, (payload) => {
                    handleRealtimeTransactionUpdate(payload.new, 'UPDATE');
                })
                .subscribe();

            if (window.currentUser) {
                supabaseClient.channel('realtime_profile_stats')
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'profiles',
                        filter: `id=eq.${window.currentUser.id}`
                    }, (payload) => {
                        const d = payload.new;
                        const earnedEl = document.getElementById('profile-earned');
                        const spentEl  = document.getElementById('profile-spent');
                        if (earnedEl && d.total_earned !== undefined)
                            earnedEl.innerHTML = `${Number(d.total_earned).toLocaleString('cs-CZ')} <span class="text-sm text-gray-400 font-bold">Kč</span>`;
                        if (spentEl && d.total_spent !== undefined)
                            spentEl.innerHTML = `${Number(d.total_spent).toLocaleString('cs-CZ')} <span class="text-sm text-gray-400 font-bold">Kč</span>`;
                    })
                    .subscribe();
            }
        };

        // --- OPRAVA PŘÍHOZU ---
        window.placeBid = async function(id, amount) {
            if (!window.currentUser) {
                showToast("Pro uskutečnění příhozu musíte být přihlášeni.", "warning");
                navigate('login');
                return;
            }

            const pEl = document.getElementById('price-' + id);
            
            let currentPrice = parseInt(pEl.getAttribute('data-price'));
            let val = currentPrice + amount;
            
            if (supabaseClient) {
                const { error: bidError } = await supabaseClient.from('bids').insert([{
                    auction_id: id,
                    bidder_id: window.currentUser.id,
                    amount: val
                }]);

                if (bidError) {
                    console.error("Chyba při ukládání do tabulky bids:", bidError);
                    showToast("Chyba DB: Příhoz se nepodařilo uložit! " + bidError.message, "warning");
                    return; 
                }

                supabaseClient.from('aukce').update({ 
                    current_price: val,
                    last_bidder_id: window.currentUser.id 
                }).eq('id', id).then();
            }
            
            let localBids = JSON.parse(localStorage.getItem('ft_local_bids') || '{}');
            localBids[id] = { price: val, last_bidder_id: window.currentUser.id };
            localStorage.setItem('ft_local_bids', JSON.stringify(localBids));
            
            showToast("Váš příhoz " + val.toLocaleString('cs-CZ') + " Kč byl úspěšně přijat!", "success");
            toggleBidMenu(id);
            
            handleRealtimeAuctionUpdate({
                id: id,
                current_price: val,
                last_bidder_id: window.currentUser.id
            });
        };

        // --- INTERAKTIVNÍ 360° PROHLÍŽEČ ---
        let isDragging = false;
        let startX = 0;
        let currentPos = 0;

        window.open360 = function(imgSrc) {
            const modal = document.getElementById('modal-360');
            const img = document.getElementById('img-360');
            img.src = imgSrc;
            currentPos = 0;
            img.style.transform = `rotateY(0deg)`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.close360 = function() {
            document.getElementById('modal-360').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
        }
        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            const diff = x - startX;
            currentPos += diff * 0.5;
            document.getElementById('img-360').style.transform = `rotateY(${currentPos}deg)`;
            startX = x;
        }
        function stopDrag() {
            isDragging = false;
        }

        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.view) navigate(event.state.view, event.state.param);
            else navigate('home');
        });

        // --- INICIALIZACE - OPRAVENO ABY NEBLOKOVALA ---
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Okamžitě vykreslit UI (domovské dlaždice) bez čekání na DB
            const hash = window.location.hash.replace('#', '');
            if (hash) navigate(hash);
            else navigate('home');

            // 2. Teprve nyní na pozadí vytáhnout data z databáze
            fetchDatabaseItems().then(() => {
                const currentHash = window.location.hash.replace('#', '');
                // Po načtení automaticky překreslíme ty stránky, které data potřebují (Aukce, Pevná cena, atd.)
                if (currentHash && currentHash !== 'home' && currentHash !== 'login' && currentHash !== 'kontakt' && currentHash !== 'vop' && currentHash !== 'novy-inzerat' && currentHash !== 'kyc') {
                    navigate(currentHash);
                }
            });
            
            setupRealtime();
        });
    </script>
</body>
</html>
