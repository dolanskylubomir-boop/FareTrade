    <style>
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-animated {
            background: linear-gradient(-45deg, #FDF8F3, #FCE7F3, #E0F2FE, #F3E8FF);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .viewer-360-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
            cursor: grab;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .viewer-360-container:active {
            cursor: grabbing;
        }
        .viewer-360-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 0.05s linear;
        }
        /* Skrytí scrollbaru pro horizontální menu kategorií */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

        // --- DATABÁZOVÁ FUNKCIONALITA SUPABASE ---
        async function fetchDatabaseItems() {
            if (!supabaseClient) return;
            try {
                // Stažení dat z tabulek 'aukce' a 'pevna_cena'
                const { data: dbAukce, error: err1 } = await supabaseClient.from('aukce').select('*');
                const { data: dbPevna, error: err2 } = await supabaseClient.from('pevna_cena').select('*');
                
                if (!err1 && dbAukce && dbAukce.length > 0) dataAukce = dbAukce;
                if (!err2 && dbPevna && dbPevna.length > 0) dataPevnaCena = dbPevna;
            } catch(e) {
                console.log("Používají se předpřipravená lokální data.");
            }
        }

        // Sledování stavu přihlášení uživatele
        if (supabaseClient) {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                const btn = document.getElementById('btn-register-top');
                if (session && session.user) {
                    if (btn) btn.innerText = "Můj Profil";
                } else {
                    if (btn) btn.innerText = "Registrovat";
                }
            });
        }

        // Funkce pro autentizaci přes poskytovatele
        window.loginWithProvider = async function(providerName) {
            if (!supabaseClient) {
                alert("Supabase není nakonfigurován! Vyplň SUPABASE_URL a SUPABASE_ANON_KEY v kódu.");
                return;
            }
            await supabaseClient.auth.signInWithOAuth({ provider: providerName });
        };

        // Registrace a přihlášení e-mailem přes formulář
        window.handleEmailAuth = async function(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");
            
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const action = e.submitter.getAttribute('data-action');

            if (action === 'signup') {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert("Chyba registrace: " + error.message);
                else alert("Registrační e-mail byl odeslán! Zkontrolujte si schránku.");
            } else {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Chyba přihlášení: " + error.message);
                else {
                    alert("Úspěšně přihlášen!");
                    navigate('home');
                }
            }
        };

        // Odeslání KYC dat formuláře do tabulky profiles
        window.handleKYCSubmit = async function(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return alert("Pro uložení KYC musíte být přihlášeni.");

            const profileData = {
                id: user.id,
                first_name: document.getElementById('kyc-fname').value,
                last_name: document.getElementById('kyc-lname').value,
                birth_year: parseInt(document.getElementById('kyc-year').value),
                address: document.getElementById('kyc-address').value,
                bank_account: document.getElementById('kyc-bank').value,
                kyc_status: 'submitted'
            };

            const { error } = await supabaseClient.from('profiles').upsert(profileData);
            if (error) alert("Chyba ukládání: " + error.message);
            else {
                alert("KYC údaje byly bezpečně odeslány ke kontrole!");
                navigate('home');
            }
        };

        // --- NAVIGACE A ROUTING (SPA) ---
        function navigate(path, param = null) {
            let viewName = path;
            let idOrCategory = param;

            if (path.includes('/')) {
                const parts = path.split('/');
                viewName = parts[0];
                idOrCategory = parts[1];
            }

            const app = document.getElementById('app');
            if (!views[viewName]) viewName = 'home';
            
            let htmlToRender = views[viewName](idOrCategory);
            app.innerHTML = htmlToRender;

            const fullUrl = idOrCategory && !vsechnyKategorie.includes(idOrCategory) ? `${viewName}/${idOrCategory}` : viewName;
            if (fullUrl !== 'home') {
                history.pushState({ view: fullUrl, param: idOrCategory }, '', '#' + fullUrl);
            } else {
                history.pushState({ view: 'home' }, '', window.location.pathname);
            }
        }

            document.getElementById('bid-menu-' + id).classList.toggle('hidden');
        };

        window.placeBid = async function(id, amount) {
            const pEl = document.getElementById('price-' + id);
            const tEl = document.getElementById('total-' + id);
            
            let val = parseInt(pEl.getAttribute('data-price')) + amount;
            
            // Lokální okamžitá vizuální změna
            pEl.setAttribute('data-price', val);
            pEl.innerText = val.toLocaleString('cs-CZ') + ' Kč';
            tEl.innerText = getPriceInfo(val).total.toLocaleString('cs-CZ') + ' Kč';
            
            // Zápis příhozu do Supabase
            if (supabaseClient) {
                const { error } = await supabaseClient
                    .from('aukce')
                    .update({ price: val })
                    .eq('id', id);
                    
                if (error) console.error("Chyba při synchronizaci příhozu do DB:", error.message);
            }
            
            toggleBidMenu(id);
        };

        // --- INTERAKTIVNÍ 360° PROHLÍŽEČ ---
        let isDragging = false;
        let startX = 0;
        let currentPos = 0;

        window.open360 = function(imgSrc) {
            const modal = document.getElementById('modal-360');
            const img = document.getElementById('img-360');
            img.src = imgSrc;
            currentPos = 0;
            img.style.transform = `rotateY(0deg)`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.close360 = function() {
            document.getElementById('modal-360').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
        }
        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            const diff = x - startX;
            currentPos += diff * 0.5;
            document.getElementById('img-360').style.transform = `rotateY(${currentPos}deg)`;
            startX = x;
        }
        function stopDrag() {
            isDragging = false;
        }

        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.view) {
                navigate(event.state.view, event.state.param);
            } else {
                navigate('home');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // Nejprve se pokusíme načíst reálná data, pokud je spuštěn Supabase
            await fetchDatabaseItems();
            
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                navigate(hash);
            } else {
                navigate('home');
            }
        });
    </script>
</body>
</html>
