<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FairTrade Tržiště</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            blue: '#E0F2FE',
                            pink: '#FCE7F3',
                            bg: '#FDF8F3',
                            text: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-animated {
            background: linear-gradient(-45deg, #FDF8F3, #FCE7F3, #E0F2FE, #F3E8FF);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .viewer-360-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
            cursor: grab;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .viewer-360-container:active {
            cursor: grabbing;
        }
        .viewer-360-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 0.05s linear;
        }
        /* Skrytí scrollbaru pro horizontální menu kategorií */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-animated text-pastel-text font-sans min-h-screen flex flex-col selection:bg-sky-200">

    <header class="w-full py-5 px-6 bg-white/80 backdrop-blur-md shadow-sm z-40 sticky top-0 transition-all">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            
            <div class="cursor-pointer flex-shrink-0" onclick="navigate('home')">
                <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight text-pastel-text">
                    Fair<span class="text-sky-400">Trade</span>
                </h1>
            </div>
            
            <nav class="hidden md:flex gap-8 text-gray-600 font-bold text-sm uppercase tracking-wider">
                <button onclick="navigate('kontakt')" class="hover:text-sky-500 transition-colors">Kontakt</button>
                <button onclick="navigate('vop')" class="hover:text-sky-500 transition-colors">VOP</button>
            </nav>

            <div class="flex items-center gap-3 md:gap-5">
                <button id="btn-register-top" onclick="navigate('login')" class="hidden sm:block text-gray-600 hover:text-sky-500 font-bold transition-colors">
                    Registrovat
                </button>
                
                <button onclick="navigate('novy-inzerat')" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-4 md:py-3 md:px-6 rounded-xl md:rounded-2xl transition-all shadow-md flex items-center gap-2 text-sm md:text-base">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="hidden md:inline">Vložit inzerát</span>
                    <span class="md:hidden">Přidat</span>
                </button>
            </div>
        </div>
    </header>

    <main id="app" class="flex-grow w-full max-w-6xl mx-auto p-6 md:p-8 flex flex-col justify-center relative">
    </main>

    <div id="modal-360" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-3xl overflow-hidden shadow-2xl">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-bold text-xl flex items-center gap-2">
                    <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Interaktivní 360° prohlídka
                </h3>
                <button onclick="close360()" class="text-gray-400 hover:text-red-500 transition-colors p-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="viewer-360-container bg-gray-100" id="viewer-container" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="stopDrag()" onmouseleave="stopDrag()" ontouchstart="startDrag(event)" ontouchmove="doDrag(event)" ontouchend="stopDrag()">
                <div class="absolute z-10 top-4 bg-black/60 text-white px-4 py-2 rounded-full text-sm font-bold pointer-events-none flex items-center gap-2">
                    <svg class="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    Tážením myší otáčejte
                </div>
                <img id="img-360" src="" class="viewer-360-img">
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE KONFIGURACE ---
        const SUPABASE_URL = 'https://mpioazyvtgcpxjrhbflp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1waW9henl2dGdjcHhqcmhiZmxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDM1MjksImV4cCI6MjA5NjU3OTUyOX0.pNgPqE1aOrsA2efj5H5FIkNjdcKxo7MVycEjfyEVc4s';
        
        let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ESCROW_FEE = 49;
        const vsechnyKategorie = ['Vše', 'Elektronika', 'Šperky', 'Sběratelství', 'Móda', 'Domácnost'];

        // Globální proměnné pro data
        let dataAukce = [];
        let dataPevnaCena = [];

        // Pomocné funkce
        window.renderCategories = function(view, currentFilter) {
            return `
            <div class="flex gap-2 overflow-x-auto pb-4 mb-4 scrollbar-hide">
                ${vsechnyKategorie.map(kat => `
                    <button onclick="navigate('${view}', '${kat}')" class="whitespace-nowrap px-5 py-2 rounded-full font-bold text-sm transition-all ${currentFilter === kat ? (view==='aukce' ? 'bg-sky-500 text-white shadow-md' : 'bg-pink-500 text-white shadow-md') : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}">${kat}</button>
                `).join('')}
            </div>`;
        };

        window.getPriceInfo = function(price) {
            const fee = Math.round(price * 0.05);
            return { fee: fee, total: price + fee + ESCROW_FEE };
        };

        // --- NAČÍTÁNÍ Z DATABÁZE ---
        window.fetchDatabaseItems = async function() {
            if (!supabaseClient) return;
            try {
                // Připojíme údaje o prodejci
                const { data: dbAukce, error: err1 } = await supabaseClient.from('aukce').select('*, profiles(first_name, last_name, is_verified, rating)');
                const { data: dbPevna, error: err2 } = await supabaseClient.from('pevna_cena').select('*, profiles(first_name, last_name, is_verified, rating)');
                
                const getSellerName = (prof) => {
                    if (!prof) return 'Neznámý prodejce';
                    const name = `${prof.first_name || ''} ${prof.last_name || ''}`.trim();
                    return name || 'Uživatel tržiště';
                };

                if (!err1 && dbAukce) {
                    dataAukce = dbAukce.map(item => ({
                        id: item.id,
                        title: item.title,
                        price: item.current_price || item.starting_price || 0,
                        category: item.category,
                        img: item.images && item.images.length > 0 ? item.images[0] : 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=600&auto=format&fit=crop',
                        has360: item.has_360,
                        seller: getSellerName(item.profiles),
                        verified: item.profiles ? item.profiles.is_verified : false,
                        rating: item.profiles ? item.profiles.rating : 0,
                        description: item.description
                    }));
                }

                if (!err2 && dbPevna) {
                    dataPevnaCena = dbPevna.map(item => ({
                        id: item.id,
                        title: item.title,
                        price: item.price || 0,
                        category: item.category,
                        img: item.images && item.images.length > 0 ? item.images[0] : 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=600&auto=format&fit=crop',
                        has360: item.has_360,
                        seller: getSellerName(item.profiles),
                        verified: item.profiles ? item.profiles.is_verified : false,
                        rating: item.profiles ? item.profiles.rating : 0,
                        description: item.description
                    }));
                }
            } catch(e) {
                console.error("Chyba načítání reálných dat:", e);
            }
        };

        // --- AUTH & PROFIL ---
        async function checkUserProfileKYC(user) {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient.from('profiles').select('kyc_status').eq('id', user.id).single();
                if (!error && data && data.kyc_status === 'unverified') navigate('kyc');
            } catch (e) {
                console.error("Chyba kontroly KYC:", e);
            }
        }

        if (supabaseClient) {
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                const btn = document.getElementById('btn-register-top');
                if (session && session.user) {
                    if (btn) {
                        btn.innerText = "Můj Profil";
                        btn.setAttribute('onclick', "navigate('profil')"); 
                    }
                    if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                        await checkUserProfileKYC(session.user);
                    }
                } else {
                    if (btn) {
                        btn.innerText = "Registrovat";
                        btn.setAttribute('onclick', "navigate('login')");
                    }
                }
            });
        }

        window.loginWithProvider = async function(providerName) {
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");
            await supabaseClient.auth.signInWithOAuth({ provider: providerName });
        };

        window.handleEmailAuth = async function(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");
            
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const action = e.submitter.getAttribute('data-action');

            if (action === 'signup') {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert("Chyba registrace: " + error.message);
                else {
                    alert("Registrace úspěšná!");
                    if (data && data.user) await checkUserProfileKYC(data.user);
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Chyba přihlášení: " + error.message);
                else {
                    alert("Úspěšně přihlášen!");
                    if (data && data.user) {
                        await checkUserProfileKYC(data.user);
                    } else {
                        navigate('home');
                    }
                }
            }
        };

        window.handleLogout = async function() {
            if (!supabaseClient) return;
            const { error } = await supabaseClient.auth.signOut();
            if (error) alert("Chyba při odhlašování: " + error.message);
            else { alert("Byli jste úspěšně odhlášeni."); navigate('home'); }
        };

        window.handleKYCSubmit = async function(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");
            
            const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
            if (userError || !user) {
                alert("Pro uložení KYC musíte být přihlášeni. Přesměrovávám na přihlášení.");
                navigate('login');
                return;
            }

            const profileData = {
                first_name: document.getElementById('kyc-fname').value,
                last_name: document.getElementById('kyc-lname').value,
                birth_date: document.getElementById('kyc-date').value,
                street: document.getElementById('kyc-street').value,
                building_number: document.getElementById('kyc-cp').value,
                orientation_number: document.getElementById('kyc-co').value,
                city: document.getElementById('kyc-city').value,
                zip_code: document.getElementById('kyc-zip').value,
                bank_account: document.getElementById('kyc-bank').value,
                kyc_status: 'submitted'
            };

            const { error } = await supabaseClient.from('profiles').update(profileData).eq('id', user.id);
            if (error) alert("Chyba ukládání do databáze: " + error.message);
            else {
                alert("Ověření totožnosti úspěšně uloženo k Vašemu účtu a odesláno ke kontrole!");
                navigate('home');
            }
        };

        // --- VLOŽENÍ INZERÁTU (ZÁPIS DO DB) ---
        window.toggleAuctionFields = function(isAuction) {
            const fixedPrice = document.getElementById('field-fixed-price');
            const aucPrice = document.getElementById('field-auction-price');
            const aucDuration = document.getElementById('field-auction-duration');
            const priceInput = document.getElementById('ad-price');
            const startingInput = document.getElementById('ad-starting-price');

            if (isAuction) {
                fixedPrice.classList.add('hidden'); fixedPrice.classList.remove('flex');
                aucPrice.classList.remove('hidden'); aucPrice.classList.add('flex');
                aucDuration.classList.remove('hidden'); aucDuration.classList.add('flex');
                priceInput.removeAttribute('required'); startingInput.setAttribute('required', 'true');
            } else {
                fixedPrice.classList.remove('hidden'); fixedPrice.classList.add('flex');
                aucPrice.classList.add('hidden'); aucPrice.classList.remove('flex');
                aucDuration.classList.add('hidden'); aucDuration.classList.remove('flex');
                startingInput.removeAttribute('required'); priceInput.setAttribute('required', 'true');
            }
        };

        window.generateAIContent = function() {
            const title = document.getElementById('ad-title').value;
            const btnText = document.getElementById('ai-btn-text');
            const descriptionBox = document.getElementById('ad-description');
            const priceBox = document.getElementById('ad-price');
            const startingPriceBox = document.getElementById('ad-starting-price');

            if (!title || title.length < 3) {
                alert("Nejprve prosím napište alespoň název zboží, aby měla AI z čeho vařit.");
                document.getElementById('ad-title').focus();
                return;
            }

            btnText.innerText = "Analyzuji trh a generuji...";
            
            setTimeout(() => {
                const aiDescription = `Prodávám vynikající položku: ${title}. \n\nTento kousek byl pečlivě zkontrolován a je připraven dělat radost novému majiteli. Ideální příležitost získat prémiovou kvalitu za zlomek původní ceny. Garantuji bezproblémové předání a stav přesně podle fotografií. V případě dotazů mě neváhejte kontaktovat!`;
                const aiPrice = Math.floor(Math.random() * (15000 - 500 + 1) + 500);

                descriptionBox.value = aiDescription;
                descriptionBox.classList.add('bg-yellow-50');
                priceBox.value = aiPrice;
                priceBox.classList.add('bg-yellow-50');
                startingPriceBox.value = Math.floor(aiPrice * 0.3); 
                startingPriceBox.classList.add('bg-yellow-50');

                btnText.innerText = "Hotovo! (Upravte si text)";
                
                setTimeout(() => {
                    descriptionBox.classList.remove('bg-yellow-50');
                    priceBox.classList.remove('bg-yellow-50');
                    startingPriceBox.classList.remove('bg-yellow-50');
                }, 2000);
            }, 1500);
        };

        window.previewImage = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const container = input.parentElement;
                reader.onload = function(e) {
                    container.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-2xl">`;
                    container.classList.remove('border-dashed', 'bg-sky-50', 'border-sky-200');
                }
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.handleAdSubmit = async function(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("Supabase není nakonfigurován!");

            const btn = document.querySelector('form button[type="submit"]');
            const origText = btn ? btn.innerText : 'Odeslat';
            if (btn) { btn.innerText = "Zapisuji do databáze..."; btn.disabled = true; }

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) throw new Error("Pro vložení inzerátu musíte být přihlášeni.");

                const typeEl = document.querySelector('input[name="ad-type"]:checked');
                const isAuction = typeEl && typeEl.value === 'aukce';
                
                const title = document.getElementById('ad-title').value;
                const category = document.getElementById('ad-category').value;
                const condition = document.getElementById('ad-condition').value;

                if (!title || !category || !condition) throw new Error("Vyplňte prosím název, kategorii a stav.");

                const adData = {
                    seller_id: user.id,
                    title: title,
                    description: document.getElementById('ad-description').value || '',
                    category: category,
                    condition: condition,
                    brand: document.getElementById('ad-brand').value || null,
                    weight: parseFloat(document.getElementById('ad-weight').value) || null,
                    dimensions: document.getElementById('ad-dimensions').value || null,
                    shipping_methods: Array.from(document.querySelectorAll('input[name="shipping"]:checked')).map(el => el.value),
                    images: ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800&auto=format&fit=crop'],
                    has_360: false,
                    status: 'aktivní'
                };

                let tableName = isAuction ? 'aukce' : 'pevna_cena';

                if (isAuction) {
                    const startPrice = parseInt(document.getElementById('ad-starting-price').value);
                    if (isNaN(startPrice) || startPrice < 1) throw new Error("Neplatná vyvolávací cena!");
                    
                    const durationDays = parseInt(document.getElementById('ad-duration').value) || 7;
                    const endTime = new Date();
                    endTime.setDate(endTime.getDate() + durationDays);

                    adData.starting_price = startPrice;
                    adData.current_price = startPrice;
                    adData.end_time = endTime.toISOString();
                } else {
                    const fixPrice = parseInt(document.getElementById('ad-price').value);
                    if (isNaN(fixPrice) || fixPrice < 1) throw new Error("Neplatná pevná cena!");
                    adData.price = fixPrice;
                }

                const { error } = await supabaseClient.from(tableName).insert([adData]);
                if (error) throw new Error(error.message);

                alert("Inzerát byl úspěšně nahrán na tržiště!");
                await fetchDatabaseItems(); 
                navigate(isAuction ? 'aukce' : 'pevna-cena');

            } catch (err) {
                alert("Chyba při ukládání: " + err.message);
            } finally {
                if (btn) { btn.innerText = origText; btn.disabled = false; }
            }
        };

        // --- DASHBOARD DATA ---
        window.loadProfileData = async function(activeTab = 'inzeraty') {
            if (!supabaseClient) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { navigate('login'); return; }
            
            const emailEl = document.getElementById('profile-email');
            if(emailEl) emailEl.innerText = user.email;

            const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();

            if (data && !error) {
                const fullName = (data.first_name || '') + ' ' + (data.last_name || '');
                const nameEl = document.getElementById('profile-name');
                if(nameEl) nameEl.innerText = fullName.trim() || 'Nepojmenovaný uživatel';
                
                const initials = (data.first_name ? data.first_name[0] : '') + (data.last_name ? data.last_name[0] : '');
                const initEl = document.getElementById('profile-initials');
                if(initEl) initEl.innerText = initials.toUpperCase() || '👤';

                const earnedEl = document.getElementById('profile-earned');
                if(earnedEl) earnedEl.innerHTML = `${data.total_earned || 0} <span class="text-xl text-gray-400 font-bold">Kč</span>`;
                
                if(data.is_verified) {
                     const badgeEl = document.getElementById('profile-verified-badge');
                     if(badgeEl) { badgeEl.classList.remove('hidden'); badgeEl.classList.add('inline-flex'); }
                }

                if (activeTab === 'kyc') {
                    const kycName = document.getElementById('kyc-display-name');
                    const kycDate = document.getElementById('kyc-display-date');
                    const kycAddress = document.getElementById('kyc-display-address');
                    const kycBank = document.getElementById('kyc-display-bank');
                    const kycBadge = document.getElementById('kyc-status-badge');

                    if(kycName) kycName.innerText = fullName.trim() || 'Nezadáno';
                    
                    if(kycDate && data.birth_date) {
                        const parts = data.birth_date.split('-');
                        kycDate.innerText = parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0]}` : data.birth_date;
                    } else if (kycDate) kycDate.innerText = 'Nezadáno';

                    if(kycAddress) {
                        if (data.street || data.city) {
                            const coStr = data.orientation_number ? `/${data.orientation_number}` : '';
                            kycAddress.innerText = `${data.street || ''} ${data.building_number || ''}${coStr}, ${data.zip_code || ''} ${data.city || ''}`;
                        } else kycAddress.innerText = 'Nezadáno';
                    }

                    if(kycBank) kycBank.innerText = data.bank_account || 'Nezadáno';

                    if(kycBadge) {
                        if (data.kyc_status === 'submitted') {
                            kycBadge.innerText = 'Čeká na schválení';
                            kycBadge.className = 'bg-amber-100 text-amber-800 text-xs px-3 py-1 rounded-full font-bold uppercase border border-amber-200';
                        } else if (data.kyc_status === 'approved' || data.is_verified) {
                            kycBadge.innerText = 'Schváleno / Ověřeno';
                            kycBadge.className = 'bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full font-bold uppercase border border-green-200';
                        } else {
                            kycBadge.innerText = 'Neověřeno';
                            kycBadge.className = 'bg-red-100 text-red-800 text-xs px-3 py-1 rounded-full font-bold uppercase border border-red-200';
                        }
                    }
                }
            }
        };

        window.renderProfileTabContent = function(tab) {
            if (tab === 'kyc') {
                return `
                    <div class="flex items-center justify-between mb-6 fade-in">
                        <h3 class="text-xl font-bold text-gray-800">Moje osobní a KYC údaje</h3>
                        <span id="kyc-status-badge" class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">Načítám status...</span>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 bg-gray-50/50 p-6 rounded-3xl border border-gray-100 mb-4 fade-in">
                        <div>

            }
            
            if (tab === 'oblibene') {

        // --- STRÁNKY ---
        const views = {
            home: () => `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full fade-in">
                    <div onclick="navigate('aukce')" class="relative h-[450px] md:h-[500px] rounded-[2rem] overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 cursor-pointer bg-white group">
                        <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=1000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-700">

                            <h2 class="text-4xl md:text-5xl font-bold text-white mb-3 drop-shadow-lg">Pevná cena</h2>
                            <p class="text-white/95 text-xl drop-shadow-md">Kup hned za stanovenou částku bez čekání.</p>
                        </div>
                    </div>
                </div>
            `,
            
            kontakt: () => `
                <div class="w-full bg-white/90 backdrop-blur-xl p-10 rounded-[2rem] shadow-xl fade-in min-h-[500px] border border-white/50 flex flex-col items-center justify-center relative">

                </div>
            `,
            
            vop: () => `

            login: () => `

                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>

                        <button onclick="loginWithProvider('google')" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 text-gray-700 font-bold py-3.5 px-6 rounded-2xl hover:bg-gray-50 hover:shadow-md transition-all">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Pokračovat přes Google
                        </button>

                        <button onclick="loginWithProvider('facebook')" class="w-full flex items-center justify-center gap-3 bg-[#1877F2] text-white font-bold py-3.5 px-6 rounded-2xl hover:bg-[#166FE5] hover:shadow-md transition-all shadow-[0_5px_15px_-5px_rgba(24,119,242,0.5)]">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            Pokračovat přes Facebook
                        </button>

                        <div class="relative flex py-2 items-center">
                            <div class="flex-grow border-t border-gray-200"></div>

                            <div class="flex-grow border-t border-gray-200"></div>
                        </div>

                        <form onsubmit="handleEmailAuth(event)" class="flex flex-col gap-3">
                            <input type="email" id="email-input" placeholder="Váš e-mail" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                            <input type="password" id="password-input" placeholder="Heslo" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">

                                <button type="submit" data-action="signin" class="flex-1 bg-gray-800 text-white font-bold py-3 rounded-xl text-sm hover:bg-gray-900 transition-colors">Přihlásit</button>

                            </div>
                        </form>
                    </div>

            `,

            kyc: () => `

                    <form onsubmit="handleKYCSubmit(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold text-gray-500 pl-1">Jméno</label>
                            <input type="text" id="kyc-fname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">

                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold text-gray-500 pl-1">Příjmení</label>
                            <input type="text" id="kyc-lname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                        </div>
                        <div class="flex flex-col gap-1 sm:col-span-2">
                            <label class="text-xs font-bold text-gray-500 pl-1">Datum narození</label>
                            <input type="date" id="kyc-date" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                        </div>
                        
                        <div class="flex flex-col gap-1 sm:col-span-2 mt-2 pt-4 border-t border-gray-200/60">
                            <label class="text-xs font-bold text-gray-500 pl-1">Ulice</label>
                            <input type="text" id="kyc-street" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 sm:col-span-2">
                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-gray-500 pl-1">Číslo popisné</label>
                                <input type="text" id="kyc-cp" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-gray-500 pl-1">Č. orientační <span class="font-normal opacity-70">(nepovinné)</span></label>

                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 sm:col-span-2 mb-2 pb-4 border-b border-gray-200/60">
                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-gray-500 pl-1">Město</label>
                                <input type="text" id="kyc-city" required class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">

                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-gray-500 pl-1">PSČ</label>

                            </div>
                        </div>

                            <label class="text-xs font-bold text-gray-500 pl-1">Bankovní účet</label>
                            <input type="text" id="kyc-bank" required placeholder="Např. 123456789/0100" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-sky-400 bg-white/50">
                        </div>

                            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl transition-all shadow-md text-base">
                                Odeslat dokumenty k ověření
                            </button>
                        </div>
                    </form>
                </div>
            `,

            profil: (activeTab = 'inzeraty') => {
                if (typeof activeTab !== 'string' || !activeTab) activeTab = 'inzeraty';
                setTimeout(() => { loadProfileData(activeTab); }, 0);
                
                const getTabStyle = (tabName) => tabName === activeTab 
                    ? 'px-8 py-5 font-bold text-sky-500 border-b-2 border-sky-500 bg-sky-50/50 whitespace-nowrap outline-none'

                        <div id="profile-initials" class="w-24 h-24 rounded-full bg-gradient-to-tr from-sky-400 to-sky-200 flex items-center justify-center text-white font-bold text-4xl shadow-lg shrink-0 select-none">

                        <div class="bg-white/90 backdrop-blur-xl p-6 rounded-[1.5rem] shadow-sm border border-gray-100 flex flex-col">
                            <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Aktivní nabídky</span>

                        </div>
                        <div class="bg-white/90 backdrop-blur-xl p-6 rounded-[1.5rem] shadow-sm border border-gray-100 flex flex-col">

                                    </p>
                                    <div class="flex items-center text-yellow-500 text-sm font-bold gap-1">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                        ${item.rating} / 5
                                    </div>
                                </div>
                            </div>

                            <p class="text-gray-600 mb-8 leading-relaxed">${item.description}</p>
                            
                            <div class="bg-pink-50 border border-pink-100 p-6 rounded-3xl mb-8">
                                <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Cena prodejce</p>
                                <div class="text-4xl font-black text-gray-800 mb-4">${item.price.toLocaleString('cs-CZ')} Kč</div>
                                
                                <div class="border-t border-pink-200/50 pt-4 mt-2">
                                    <p class="text-gray-500 text-sm font-semibold uppercase mb-1">Konečná cena pro kupujícího</p>
                                    <div class="flex items-end gap-3">
                                        <div class="text-2xl font-bold text-pink-600">${prices.total.toLocaleString('cs-CZ')} Kč</div>
                                        <div class="text-xs text-gray-400 mb-1 pb-0.5">(obsahuje +5% poplatek a ${ESCROW_FEE} Kč za úschovu)</div>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-5 px-8 rounded-2xl transition-all shadow-[0_10px_20px_-10px_rgba(236,72,153,0.6)] text-xl">
                                Koupit ihned
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }
        };

        // --- NAVIGACE A ROUTING (SPA) ---
        function navigate(path, param = null) {
            let viewName = path;
            let idOrCategory = param;

            if (path.includes('/')) {
                const parts = path.split('/');
                viewName = parts[0];
                idOrCategory = parts[1];
            }

            const app = document.getElementById('app');
            if (!views[viewName]) viewName = 'home';
            
            let htmlToRender = views[viewName](idOrCategory);
            app.innerHTML = htmlToRender;

            const fullUrl = idOrCategory && !vsechnyKategorie.includes(idOrCategory) ? `${viewName}/${idOrCategory}` : viewName;
            if (fullUrl !== 'home') {
                history.pushState({ view: fullUrl, param: idOrCategory }, '', '#' + fullUrl);
            } else {
                history.pushState({ view: 'home' }, '', window.location.pathname);
            }
        }

        window.toggleBidMenu = function(id) {
            document.getElementById('bid-menu-' + id).classList.toggle('hidden');
        };

        window.placeBid = async function(id, amount) {
            const pEl = document.getElementById('price-' + id);
            const tEl = document.getElementById('total-' + id);
            
            let val = parseInt(pEl.getAttribute('data-price')) + amount;
            
            pEl.setAttribute('data-price', val);
            pEl.innerText = val.toLocaleString('cs-CZ') + ' Kč';
            tEl.innerText = getPriceInfo(val).total.toLocaleString('cs-CZ') + ' Kč';
            
            if (supabaseClient) {
                const { error } = await supabaseClient.from('aukce').update({ current_price: val }).eq('id', id);
                if (error) console.error("Chyba při synchronizaci příhozu do DB:", error.message);
            }
            toggleBidMenu(id);
        };

        // --- INTERAKTIVNÍ 360° PROHLÍŽEČ ---
        let isDragging = false;
        let startX = 0;
        let currentPos = 0;

        window.open360 = function(imgSrc) {
            const modal = document.getElementById('modal-360');
            const img = document.getElementById('img-360');
            img.src = imgSrc;
            currentPos = 0;
            img.style.transform = `rotateY(0deg)`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.close360 = function() {
            document.getElementById('modal-360').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
        }
        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            const diff = x - startX;
            currentPos += diff * 0.5;
            document.getElementById('img-360').style.transform = `rotateY(${currentPos}deg)`;
            startX = x;
        }
        function stopDrag() {
            isDragging = false;
        }

        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.view) navigate(event.state.view, event.state.param);
            else navigate('home');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchDatabaseItems();
            const hash = window.location.hash.replace('#', '');
            if (hash) navigate(hash);
            else navigate('home');
        });
    </script>
</body>
</html>
